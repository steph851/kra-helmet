name: CI

# Disabled — no triggers active
on:
  workflow_dispatch:  # manual-only, won't run on push/PR

# -----------------------------------------------------------
# TO RE-ENABLE: replace the 'on:' block above with this:
#
# on:
#   push:
#     branches: [master, main]
#   pull_request:
#     branches: [master, main]
# -----------------------------------------------------------

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t kra-deadline-tracker .

      - name: Verify container starts
        run: |
          docker run -d --name kradtc-test -p 8000:8000 kra-deadline-tracker
          sleep 3
          curl -f http://localhost:8000/health || exit 1
          docker stop kradtc-test
