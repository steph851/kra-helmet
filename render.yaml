services:
  - type: web
    name: kra-deadline-tracker
    runtime: docker
    region: frankfurt
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: HELMET_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: HELMET_WA_PROVIDER
        value: "dry_run"
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false