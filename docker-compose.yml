version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: kra-helmet-db
    environment:
      POSTGRES_USER: helmet
      POSTGRES_PASSWORD: helmet
      POSTGRES_DB: kra_helmet
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helmet -d kra_helmet"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: kra-helmet-app
    environment:
      DATABASE_URL: postgresql://helmet:helmet@db:5432/kra_helmet
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: kra_helmet
      DB_USER: helmet
      DB_PASSWORD: helmet
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./output:/app/output
      - ./staging:/app/staging
    restart: unless-stopped

volumes:
  postgres_data:
